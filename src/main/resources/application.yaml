spring:
  application:
    name: query-engine

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: UTC

server:
  port: 8080

  jwt:
    secret: ${JWT_SECRET:dev-secret-very-long-key}
    access-expiration: 900000
    refresh-expiration: 86400000

  github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/v1/auth/github/callback}